<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Frattura del Tempo — Multiplayer</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:#07071a;color:#e8e8f0;font-family:Segoe UI,system-ui,sans-serif}
    :root{--bg:#07071a;--s:#111128;--s2:#1a1a38;--b:#2a2a55;--t:#e8e8f0;--d:#9999bf;--bl:#4f8cff;--rd:#ff5266;--go:#ffcc44;--gr:#46d38a;--pu:#b066ff}
    .page{max-width:980px;margin:0 auto;padding:18px 14px 40px}
    .box{background:var(--s);border:1px solid var(--b);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
    .logo{text-align:center;font-size:2rem;font-weight:900;margin:8px 0 6px}
    .sub{text-align:center;color:var(--d);margin-bottom:18px}
    .btn{appearance:none;border:none;border-radius:12px;padding:14px 16px;font-size:1rem;font-weight:800;cursor:pointer;width:100%;background:var(--bl);color:#fff}
    .btn:disabled{opacity:.35;cursor:not-allowed}.btn.alt{background:transparent;color:var(--t);border:1px solid var(--b)}.btn.warn{background:var(--go);color:#000}.btn.bad{background:var(--rd)}.btn.small{width:auto;padding:10px 14px;font-size:.9rem}
    .grid{display:grid;gap:10px}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}
    @media(max-width:820px){.g2,.g3,.g4{grid-template-columns:1fr}}
    .label{font-size:.75rem;letter-spacing:.07em;text-transform:uppercase;color:var(--d);margin-bottom:8px}
    input[type=text],select{width:100%;padding:12px 13px;border-radius:10px;border:1px solid var(--b);background:var(--s2);color:var(--t);font-size:1rem}
    .epochs{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px}
    @media(max-width:900px){.epochs{grid-template-columns:repeat(3,minmax(0,1fr))}}
    .epoch{background:var(--s2);border:2px solid var(--b);border-radius:12px;padding:10px;text-align:center}
    .epoch.active{border-color:var(--go);box-shadow:0 0 0 1px rgba(255,204,68,.2),0 0 18px rgba(255,204,68,.13)}
    .emoji{font-size:1.3rem}.ename{font-size:.72rem;color:var(--d);margin:4px 0}.eval{font-size:1.2rem;font-weight:900}
    .bar{height:6px;background:#0d0d20;border-radius:999px;overflow:hidden;margin-top:7px}.fill{height:100%;border-radius:999px}
    .pills{display:flex;flex-wrap:wrap;gap:7px}.pill{border:1px solid var(--b);background:var(--s2);border-radius:999px;padding:6px 10px;font-size:.8rem;color:var(--d)}
    .pill.me{color:#fff;border-color:var(--bl)} .pill.current{border-color:var(--go);color:var(--go)} .pill.done{border-color:var(--gr);color:var(--gr)}
    .cardGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
    .card{background:var(--s2);border:2px solid var(--b);border-radius:12px;padding:12px;cursor:pointer;position:relative}
    .card.sel{border-color:var(--go);background:#2b250d}.card.dim{opacity:.45}.card .e{font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}.card .n{font-size:.92rem;font-weight:800;margin-bottom:6px;line-height:1.2}.card .d{font-size:.72rem;color:var(--d);line-height:1.4;min-height:40px}.card .f{display:flex;justify-content:space-between;align-items:center;margin-top:8px}.v{font-size:1rem;font-weight:900}.pos{color:var(--gr)}.neg{color:var(--rd)}.neu{color:var(--d)}.tag{font-size:.7rem;padding:4px 8px;border-radius:999px;background:#0d0d20;border:1px solid var(--b);color:var(--d)}
    .role{padding:14px;border-radius:14px;border:2px solid var(--b)}.role.sig{background:#0a1c3e;border-color:#3b78f0}.role.alt{background:#300d12;border-color:#ff5266}.rtitle{font-weight:900;font-size:1.2rem;margin-bottom:6px}.robj{font-size:.85rem;line-height:1.45;color:#d9daf7}
    .center{text-align:center}.muted{color:var(--d)} .good{color:var(--gr)} .bad{color:var(--rd)} .gold{color:var(--go)}
    .log{max-height:220px;overflow:auto;display:flex;flex-direction:column;gap:7px}.logItem{padding:8px 10px;background:var(--s2);border-radius:10px;font-size:.8rem;color:var(--d)}
    .topline{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.title{font-size:1.1rem;font-weight:900}
    .sep{height:1px;background:var(--b);margin:12px 0}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions .btn{flex:1 1 180px}.mini{font-size:.75rem;color:var(--d)}
    .kbd{display:inline-block;padding:2px 7px;border-radius:999px;background:#0d0d20;border:1px solid var(--b);font-size:.75rem;color:var(--go)}
    .twoCol{display:grid;grid-template-columns:1.45fr .95fr;gap:12px}@media(max-width:920px){.twoCol{grid-template-columns:1fr}}
    .status{padding:10px 12px;border-radius:12px;background:var(--s2);border:1px solid var(--b)}
    .bigCode{font-size:2rem;font-weight:900;letter-spacing:.18em;color:var(--go)}
    .bubble{display:inline-block;padding:4px 8px;border-radius:999px;background:#0d0d20;border:1px solid var(--b);font-size:.72rem;margin-left:6px}
    .smallList{display:flex;flex-direction:column;gap:8px}.li{padding:10px 12px;background:var(--s2);border-radius:10px;border:1px solid var(--b)}
  </style>
</head>

<script>

<script>
const EPOCHS=[{id:0,name:'Preistoria',emoji:'🦴'},{id:1,name:'Antichità',emoji:'🏛️'},{id:2,name:'Medioevo',emoji:'⚔️'},{id:3,name:'Rinascimento',emoji:'🎨'},{id:4,name:'Età Industriale',emoji:'🏭'},{id:5,name:'Futuro',emoji:'🚀'}];
const THRESHOLD_LABEL={shield:'solo se epoca attiva ≥ +1',fire:'solo se epoca attiva ≤ -1',balance:'solo se epoca attiva tra -1 e +1',infinity:'sempre'};
const ROLES=[
  {id:'custode',fac:'signori',name:'Il Custode',obj:'A fine partita almeno 4 epoche devono essere riparate (stato ≥ +1).',win:s=>s.filter(x=>x>=1).length>=4},
  {id:'archivista',fac:'signori',name:"L'Archivista",obj:'A fine partita devi avere 0 Debiti temporali. Ogni epoca che raggiunge −3 per la prima volta ti genera 1 Debito.',win:(s,g,p)=>p.debts===0},
  {id:'cronometrista',fac:'signori',name:'Il Cronometrista',obj:'A fine partita la somma totale degli stati deve essere tra −2 e +2.',win:s=>{const t=s.reduce((a,b)=>a+b,0);return t>=-2&&t<=2;}},
  {id:'anarchico',fac:'alteratori',name:"L'Anarchico",obj:'A fine partita almeno 3 epoche devono essere a −3 o peggio.',win:s=>s.filter(x=>x<=-3).length>=3},
  {id:'distruttore',fac:'alteratori',name:'Il Distruttore',obj:'Porta una singola epoca a −5 con una tua risoluzione.',win:(s,g,p)=>p.madeCollapse===true},
  {id:'paradosso_r',fac:'alteratori',name:'Il Paradosso',obj:'A fine partita: almeno 2 epoche a +3 o più e almeno 2 a −3 o peggio.',win:s=>s.filter(x=>x>=3).length>=2&&s.filter(x=>x<=-3).length>=2}
];
const ROLE_DIST={4:['custode','archivista','anarchico','paradosso_r'],5:['custode','archivista','cronometrista','anarchico','distruttore'],6:['custode','archivista','cronometrista','anarchico','distruttore','paradosso_r']};
let uid=1; const cid=()=>uid++;
function makeDeck(){
  const cards=[]; const add=(epoch,name,value,threshold,desc,effect='none',data={})=>cards.push({id:cid(),epoch,name,value,threshold,desc,effect,data,isEvent:epoch===null});
  const defs=[
    [0,'Prima Fiamma',1,'balance','+1. Pesca 1 carta.','draw',{n:1}],[0,'Mammut Arrabbiato',2,'fire','+2. Il prossimo giocatore scarta 1 carta casuale.','nextDiscard',{n:1}],[0,'Migrazioni',1,'infinity','+1. Muovi subito la tua pedina di 2 epoche.','moveSelf',{step:2}],[0,'Estinzione Locale',-2,'fire','−2. Guarda la prossima epoca attiva.','peekEpoch',{}],[0,'Grotta Sacra',1,'shield','+1. Guadagna 1 gettone.','gainToken',{n:1}],[0,'Totem Ambiguo',0,'infinity','Scegli +1 o −1 all’epoca attiva.','choicePlusMinus',{}],
    [1,'Decreto Imperiale',2,'shield','+2. Guadagni 1 gettone.','gainToken',{n:1}],[1,'Rivolta degli Schiavi',-2,'fire','−2. Tutti gli altri perdono 1 gettone.','othersLoseToken',{n:1}],[1,'Legione in Marcia',1,'infinity','+1. Muovi la tua pedina di 1 epoca.','moveSelf',{step:1}],[1,'Biblioteca di Alessandria',1,'shield','+1. Pesca 2 carte poi scartane 1 a caso.','drawThenRandomDiscard',{draw:2,discard:1}],[1,'Sabbie del Tempo',0,'balance','Scambia lo stato dell’epoca attiva con un’altra epoca.','swapWithAnother',{}],[1,'Troia in Fiamme',-2,'fire','−2. Il giocatore con più carte scarta 1 carta casuale.','richestDiscard',{n:1}],
    [2,'Crociata Minore',1,'shield','+1. Muovi la tua pedina avanti di 1.','moveSelf',{step:1}],[2,'Pestilenza',-2,'fire','−2. Tutti i giocatori nell’epoca attiva scartano 1 carta casuale.','playersInActiveDiscard',{n:1}],[2,'Codice Monastico',1,'shield','+1. Se sei da solo nella tua epoca, +1 extra.','bonusIfAlone',{bonus:1}],[2,'Alchimia Oscura',0,'balance','Se l’epoca attiva è 0, portala a +2 o −2.','setIfZeroChoice',{}],[2,'Ordine Segreto',0,'infinity','Pesca 1 carta. Questa carta si scarta subito.','draw',{n:1}],[2,'Flagellanti',-1,'fire','−1. Poi −1 per ogni altra epoca negativa, fino a −2 extra.','extraByNegativeEpochs',{max:2}],
    [3,'Mecenatismo',2,'shield','+2. Pesca 1 carta.','draw',{n:1}],[3,'Stampa a Caratteri',1,'shield','+1. Tutti pescano 1 carta.','allDraw',{n:1}],[3,'Veleno di Corte',-1,'fire','−1. Scegli un avversario: scarta 1 carta casuale.','targetDiscard',{}],[3,'Prospettiva',0,'balance','+1 per ogni epoca positiva, fino a +3.','plusByPositiveEpochs',{max:3}],[3,'Corte dei Medici',1,'shield','+1. Guadagni 2 gettoni.','gainToken',{n:2}],[3,'Controriforma',-2,'fire','−2. Il prossimo effetto speciale di questo round è annullato.','jamSpecials',{}],
    [4,'Locomotiva',0,'infinity','Muovi la tua pedina di 3. Ogni epoca attraversata migliora di +1, max +2 volte.','locomotiva',{step:3,maxBoost:2}],[4,'Carbone e Fuliggine',-2,'fire','−2. Il giocatore con più carte scarta 1 carta casuale.','richestDiscard',{n:1}],[4,'Grande Esposizione',2,'shield','+2. Guadagni 1 gettone.','gainToken',{n:1}],[4,'Colonialismo',-1,'fire','−1. Poi +1 a un’altra epoca a tua scelta.','plusOtherEpoch',{}],[4,'Sciopero Generale',-1,'fire','−1. Tutti gli altri non possono muoversi in viaggio questo round.','freezeOthers',{}],[4,'Rivoluzione Industriale',0,'balance','Se epoca attiva è 0, portala a +3 o −3. Altrimenti scegli +1 o −1.','industryShift',{}],
    [5,'Singolarità',0,'shield','+1 per ogni epoca positiva, fino a +3.','plusByPositiveEpochs',{max:3}],[5,'Crash Sistemico',-2,'fire','−2. Chi ha 5+ carte scarta fino a 3 carte.','fatHandsDiscard',{limit:4}],[5,'IA Benevola',2,'shield','+2. Il giocatore con meno gettoni guadagna 1 gettone.','poorestGainToken',{n:1}],[5,'Sorveglianza Totale',1,'shield','+1. Guarda la mano di un avversario.','peekHand',{}],[5,'Blackout Globale',0,'fire','−1 per ogni epoca positiva, fino a −3.','minusByPositiveEpochs',{max:3}],[5,'Utopia Fallita',0,'balance','Porta il Futuro esattamente a 0.','setEpoch',{target:5,value:0}],
  ]; defs.forEach(d=>add(...d));
  const events=[['Paradosso!',0,'infinity','Scambia due epoche a scelta.','swapAnyTwo',{}],['Loop Temporale',0,'infinity','Ripeti il valore finale della tua ultima carta risolta.','repeatLastOwn',{}],['Déjà Vu',0,'infinity','Copia il valore finale dell’ultima carta risolta da chiunque.','copyLastResolved',{}],['Butterfly Knife',-1,'infinity','−1 a qualsiasi epoca.','minusAnyEpoch',{}],['Effetto Farfalla',-1,'infinity','−1 epoca attiva e −1 epoca successiva.','butterfly',{}],['Buco Nero Educato',0,'infinity','Annulla la prossima carta da risolvere.','blackHole',{}],['Big Bang Ritardato',0,'infinity','Se almeno 2 epoche sono a |4| o più, tutte le epoche vanno a 0.','bigBang',{}],['Freccia del Tempo',0,'infinity','Tutte le epoche si spostano di 1 verso lo 0.','towardZero',{}],['Paradosso Nidificato',0,'infinity','Giochi subito un’altra carta dalla mano ignorando le soglie.','nested',{}],['Tempesta Cronologica',0,'infinity','Tutti passano la mano al giocatore successivo.','rotateHands',{}],['Cronista Impazzito',0,'infinity','Rivela anche la prossima epoca attiva.','peekEpoch',{}],['Momento Eureka',0,'infinity','Pesca 3 carte, tienile tutte.','draw',{n:3}]];
  events.forEach(e=>add(null,...e)); return shuffle(cards);
}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function colorForState(s){if(s>=3)return '#46d38a'; if(s>=1)return '#9de16d'; if(s===0)return '#8a8ab8'; if(s>=-2)return '#ffb44d'; return '#ff5266';}
function statePct(s){return ((s+5)/10)*100;}
function roleById(id){return ROLES.find(r=>r.id===id)}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function thresholdText(card){return card.epoch===null ? 'Evento' : THRESHOLD_LABEL[card.threshold];}
function epochBadge(card){return card.epoch===null ? 'Evento' : `${EPOCHS[card.epoch].emoji} ${EPOCHS[card.epoch].name}`;}

let G, NET;
function resetAll(){
  G={phase:'menu',round:1,players:[],epochStates:[0,0,0,0,0,0],activeEpoch:null,epochQueue:shuffle([0,1,2,3,4,5]),deck:[],discard:[],deckReshuffles:0,firstPlayer:0,played:[],resolveOrder:[],resolveIndex:0,log:[],peekEpoch:null,blockedSpecial:false,freezeMove:new Set(),collapseBy:null,lastResolved:null,lastOwnResolved:{},debtEpochs:[false,false,false,false,false,false],winnerIdxs:[],endReason:'',pendingSpecial:null,meta:{setupN:4,names:['Giocatore 1','Giocatore 2','Giocatore 3','Giocatore 4','Giocatore 5','Giocatore 6']}};
  NET={mode:null,isHost:false,myPeerId:null,roomCode:'',myName:'',myPlayerIdx:null,hostConn:null,conns:{},pendingJoins:[],status:'',joinCode:'',playersReady:{},started:false};
}
function log(msg,type=''){G.log.unshift({msg,type,round:G.round,time:Date.now()}); if(G.log.length>80)G.log.pop();}
function setState(epoch,val,sourcePlayer=null){const next=clamp(val,-5,5); G.epochStates[epoch]=next; if(next<=-3 && !G.debtEpochs[epoch]){G.debtEpochs[epoch]=true; G.players.forEach(p=>{if(p.roleId==='archivista')p.debts++;}); log(`⚠️ Debito temporale generato in ${EPOCHS[epoch].name}.`,'bad');} if(next<=-5 && sourcePlayer!=null){const p=G.players[sourcePlayer]; if(p&&p.roleId==='distruttore') p.madeCollapse=true;} return next;}
function draw1(pi){ if(G.deck.length===0){ if(G.discard.length===0) return false; G.deck=shuffle(G.discard); G.discard=[]; G.deckReshuffles++; log(`♻️ Mazzo rimescolato (${G.deckReshuffles}ª volta).`,''); } if(!G.deck.length) return false; G.players[pi].hand.push(G.deck.pop()); return true; }
function drawN(pi,n){for(let i=0;i<n;i++) draw1(pi);} 
function randomDiscard(pi,n=1){ const p=G.players[pi]; let done=0; while(done<n && p.hand.length){const idx=Math.floor(Math.random()*p.hand.length); const [c]=p.hand.splice(idx,1); G.discard.push(c); done++;} return done; }
function canPlay(card,activeState){ if(!card) return false; if(card.epoch===null) return true; if(G.round<=2) return true; if(card.threshold==='infinity') return true; if(card.threshold==='shield') return activeState>=1; if(card.threshold==='fire') return activeState<=-1; if(card.threshold==='balance') return activeState>=-1 && activeState<=1; return true; }
function initPlayers(names){ const roles=shuffle(ROLE_DIST[names.length]).slice(0,names.length); G.players=names.map((name,i)=>({name,roleId:roles[i],position:2,hand:[],tokens:2,debts:0,madeCollapse:false})); G.deck=makeDeck(); G.discard=[]; G.deckReshuffles=0; G.players.forEach((_,i)=>drawN(i,5)); G.phase='lobby'; }
function startRound(){ if(!G.epochQueue.length) G.epochQueue=shuffle([0,1,2,3,4,5]); G.activeEpoch=G.epochQueue.shift(); G.played=Array(G.players.length).fill(null); G.resolveOrder=[]; G.resolveIndex=0; G.blockedSpecial=false; G.freezeMove=new Set(); G.peekEpoch=null; G.pendingSpecial=null; G.phase='pose'; log(`Round ${G.round}: epoca attiva ${EPOCHS[G.activeEpoch].name}.`,'gold'); markAllUnready(); }
function startGame(){ G.phase='playing'; G.round=1; G.firstPlayer=0; startRound(); }
function orderForResolution(){ const ae=G.activeEpoch, n=G.players.length; return G.played.map((x,i)=>({x,i})).filter(v=>v.x).sort((a,b)=>{ const da=Math.abs(G.players[a.i].position-ae), db=Math.abs(G.players[b.i].position-ae); if(da!==db) return da-db; return ((a.i-G.firstPlayer+n)%n)-((b.i-G.firstPlayer+n)%n);}).map(v=>v.i); }
function endCheck(){ if(G.epochStates.some(s=>s<=-5)){G.endReason='Una linea temporale è collassata a −5.'; finishGame(); return true;} if(G.epochStates.filter(s=>s>=3).length>=3){G.endReason='Tre epoche sono state riparate fino a +3 o oltre.'; finishGame(); return true;} if(G.epochStates.filter(s=>s<=-3).length>=3){G.endReason='Tre epoche sono precipitate a −3 o peggio.'; finishGame(); return true;} if(G.deckReshuffles>=2){G.endReason='Il mazzo si è esaurito due volte.'; finishGame(); return true;} return false; }
function finishGame(){ G.phase='end'; G.winnerIdxs=[]; G.players.forEach((p,i)=>{const r=roleById(p.roleId); if(r&&r.win(G.epochStates,G,p)) G.winnerIdxs.push(i);}); }
function playerName(i){return G.players[i]?.name||'—';}
function applyBase(card,pi,ignoreThreshold=false){ const ae=G.activeEpoch; let finalVal=0; if(card.epoch!==null && card.epoch!==ae){ setState(ae,G.epochStates[ae]-2,pi); finalVal=-2; log(`${playerName(pi)} crea un anacronismo con ${card.name}: −2 su ${EPOCHS[ae].name}.`,'bad'); if(!ignoreThreshold && !canPlay(card,G.epochStates[ae])) return {finalVal,specialAllowed:false}; } else { if(!ignoreThreshold && !canPlay(card,G.epochStates[ae])){ log(`${playerName(pi)} scarta ${card.name} senza effetto: soglia fallita.`,'bad'); return {finalVal:0,specialAllowed:false}; } if(card.value!==0){ setState(ae,G.epochStates[ae]+card.value,pi); finalVal+=card.value; } log(`${playerName(pi)} gioca ${card.name}${card.value?` (${card.value>0?'+':''}${card.value})`:''}.`,card.value>0?'good':card.value<0?'bad':''); } return {finalVal,specialAllowed:true}; }
function continueResolution(){ if(endCheck()) return; while(G.resolveIndex < G.resolveOrder.length){ const pi=G.resolveOrder[G.resolveIndex]; const entry=G.played[pi]; G.resolveIndex++; if(!entry||entry.cancelled) continue; if(entry.cancelMe){ entry.cancelled=true; log(`${entry.card.name} di ${playerName(pi)} è stata annullata.`,'bad'); G.discard.push(entry.card); continue; } const base=applyBase(entry.card,pi,entry.ignoreThreshold===true); const finalBase=base.finalVal||0; G.lastResolved={player:pi,val:finalBase,card:entry.card}; G.lastOwnResolved[pi]=finalBase; if(base.specialAllowed && !G.blockedSpecial){ const pending=maybeRunSpecial(entry.card,pi); if(pending){ G.pendingSpecial=pending; syncAll(); return; } } else if(base.specialAllowed && G.blockedSpecial && entry.card.effect!=='none'){ log(`L'effetto speciale di ${entry.card.name} è stato neutralizzato.`,'bad'); G.blockedSpecial=false; }
    G.discard.push(entry.card); if(endCheck()) return; }
  beginTravel(); }
function maybeRunSpecial(card,pi){ const ae=G.activeEpoch; switch(card.effect){
  case 'none': return null; case 'draw': drawN(pi,card.data.n||1); log(`${playerName(pi)} pesca ${card.data.n||1} carta/e.`,''); return null;
  case 'gainToken': G.players[pi].tokens += card.data.n||1; log(`${playerName(pi)} guadagna ${card.data.n||1} gettone/i.`,''); return null;
  case 'moveSelf': G.players[pi].position=clamp(G.players[pi].position+(card.data.step||1),0,5); log(`${playerName(pi)} si sposta su ${EPOCHS[G.players[pi].position].name}.`,''); return null;
  case 'peekEpoch': if(G.epochQueue.length){G.peekEpoch=G.epochQueue[0]; log(`${playerName(pi)} intravede la prossima epoca.`,'');} return null;
  case 'choicePlusMinus': return {type:'plusMinus',pi,cardName:card.name};

function resolveSpecialFromHost(payload){ const sp=G.pendingSpecial; if(!sp) return; const pi=sp.pi; switch(sp.type){ case 'plusMinus': setState(G.activeEpoch,G.epochStates[G.activeEpoch]+payload.value,pi); log(`${playerName(pi)} sceglie ${payload.value>0?'+':'−'}1.`, payload.value>0?'good':'bad'); break; case 'swapOther': {const a=G.activeEpoch,b=payload.epoch; if(b!=null){const t=G.epochStates[a]; G.epochStates[a]=G.epochStates[b]; G.epochStates[b]=t; log(`${playerName(pi)} scambia ${EPOCHS[a].name} con ${EPOCHS[b].name}.`,'gold');} break;} case 'setZeroChoice': if(G.epochStates[G.activeEpoch]===0){ setState(G.activeEpoch,payload.value,pi); log(`${playerName(pi)} imposta ${payload.value}.`,payload.value>0?'good':'bad'); } break; case 'pickTargetDiscard': if(payload.target!=null){ const n=randomDiscard(payload.target,1); if(n) log(`${playerName(payload.target)} scarta 1 carta casuale.`,'bad'); } break; case 'plusOtherEpoch': if(payload.epoch!=null){ setState(payload.epoch,G.epochStates[payload.epoch]+1,pi); log(`${EPOCHS[payload.epoch].name} migliora di +1.`,'good'); } break; case 'industryShift': if(G.epochStates[G.activeEpoch]===0 && payload.mode==='big'){ setState(G.activeEpoch,payload.value,pi); log(`${playerName(pi)} porta l'epoca a ${payload.value}.`,payload.value>0?'good':'bad'); } else if(G.epochStates[G.activeEpoch]!==0 && payload.mode==='small'){ setState(G.activeEpoch,G.epochStates[G.activeEpoch]+payload.value,pi); log(`${playerName(pi)} applica ${payload.value>0?'+':''}${payload.value}.`,payload.value>0?'good':'bad'); } break; case 'peekHand': if(payload.target!=null){ sp.target=payload.target; syncAll(); return; } break; case 'swapAnyTwo': if(payload.selected&&payload.selected.length===2){ const [a,b]=payload.selected; const t=G.epochStates[a]; G.epochStates[a]=G.epochStates[b]; G.epochStates[b]=t; log(`${playerName(pi)} scatena Paradosso! e scambia ${EPOCHS[a].name} con ${EPOCHS[b].name}.`,'gold'); } break; case 'minusAnyEpoch': if(payload.epoch!=null function closePeekHand(){ if(G.pendingSpecial&&G.pendingSpecial.type==='peekHand'){ G.pendingSpecial=null; continueResolution(); syncAll(); } }
function submitCardHost(pi,cardId){ if(G.phase!=='pose') return; if(G.played[pi]) return; const p=G.players[pi]; const idx=p.hand.findIndex(c=>c.id===cardId); if(idx<0) return; const [card]=p.hand.splice(idx,1); G.played[pi]={pi,card,cancelled:false}; NET.playersReady[pi]=true; log(`${playerName(pi)} ha bloccato la sua carta.`, ''); if(G.played.every(Boolean)){ G.phase='resolve'; G.resolveOrder=orderForResolution(); G.resolveIndex=0; continueResolution(); } syncAll(); }
function beginTravel(){ G.phase='travel'; markAllUnready(); syncAll(); }
function finishTravelHost(pi,delta){ if(G.phase!=='travel') return; const p=G.players[pi]; if(NET.playersReady[pi]) return; if(G.freezeMove.has(pi)) delta=0; p.position=clamp(p.position+delta,0,5); NET.playersReady[pi]=true; if(Object.values(NET.playersReady).filter(Boolean).length===G.players.length){ refillAndNextRound(); } syncAll(); }
function refillAndNextRound(){ G.players.forEach((p,i)=>{ while(p.hand.length<5) if(!draw1(i)) break; }); if(endCheck()) return; G.round++; G.firstPlayer=(G.firstPlayer+1)%G.players.length; startRound(); }
function spendTokenHost(pi,action,arg){ const p=G.players[pi]; if(action==='draw1' && p.tokens>=1){ p.tokens--; drawN(pi,1); log(`${p.name} spende 1 gettone e pesca 1 carta.`,''); } else if(action==='draw2' && p.tokens>=3){ p.tokens-=3; drawN(pi,2); log(`${p.name} spende 3 gettoni e pesca 2 carte.`,''); } else if(action==='forceEpoch' && p.tokens>=5){ p.tokens-=5; G.epochQueue.unshift(arg); log(`${p.name} forza la prossima epoca: ${EPOCHS[arg].name}.`,'gold'); } syncAll(); }
function markAllUnready(){ NET.playersReady={}; G.players.forEach((_,i)=>NET.playersReady[i]=false); }

function buildPublicState(){ return {phase:G.phase,round:G.round,players:G.players.map((p,i)=>({name:p.name,roleId:p.roleId,position:p.position,tokens:p.tokens,debts:p.debts,madeCollapse:p.madeCollapse,handCount:p.hand.length,played:!!G.played[i]})),epochStates:[...G.epochStates],activeEpoch:G.activeEpoch,peekEpoch:G.peekEpoch,firstPlayer:G.firstPlayer,log:G.log.slice(0,80),winnerIdxs:[...G.winnerIdxs],endReason:G.endReason,playedInfo:G.played.map(e=>e?{pi:e.pi,cardName:e.card.name}:null),pendingSpecial:G.pendingSpecial?JSON.parse(JSON.stringify(G.pendingSpecial)):null,playersReady:{...NET.playersReady},roomCode:NET.roomCode}; }

function syncAll(){ if(!NET.isHost) return; const publicState=buildPublicState(); G.players.forEach((p,i)=>{ const personal={kind:'state',publicState,playerIdx:i,hand:p.hand,canAct:canActFor(i),hostStatus:NET.status}; if(i===NET.myPlayerIdx){ receiveState(personal); } else { const conn=NET.conns[i]; sendToConn(conn,personal); } }); render(); }
function canActFor(playerIdx){ if(G.phase==='pose') return !G.played[playerIdx]; if(G.phase==='travel') return !NET.playersReady[playerIdx]; if(G.pendingSpecial && G.pendingSpecial.pi===playerIdx) return true; if(G.pendingSpecial && G.pendingSpecial.type==='peekHand' && G.pendingSpecial.pi===playerIdx && G.pendingSpecial.target!=null) return true; return false; }
function receiveState(msg){ NET.myPlayerIdx=msg.playerIdx; NET.publicState=msg.publicState; NET.hand=msg.hand||[]; NET.canAct=msg.canAct; NET.status=msg.hostStatus||NET.status; render(); }
function currentPublic(){ return NET.isHost ? buildPublicState() : NET.publicState; }
function myPlayer(){ const ps=currentPublic(); if(!ps||NET.myPlayerIdx==null) return null; return ps.players[NET.myPlayerIdx]; }

function onlineReady(){
  return location.protocol!=="file:" && !!window.Peer && window.__peerReady;
}
function peerOptions(){
  return {host:'0.peerjs.com',port:443,path:'/',secure:true,debug:1,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:global.stun.twilio.com:3478'}]}};
}
function withPeerTimeout(kind,onTimeout){
  const token=Date.now()+Math.random();
  NET._peerWaitToken=token;
  setTimeout(function(){
    if(NET._peerWaitToken!==token) return;
    if(kind==='host' && !NET.myPeerId){
      onTimeout&&onTimeout();
    }
    if(kind==='join' && !NET.hostConn){
      onTimeout&&onTimeout();
    }
  },9000);
}
function networkHelpText(){
  if(location.protocol==='file:') return 'Apri il gioco da un link https (GitHub Pages, Netlify, itch.io). Da file locale la stanza può non inizializzarsi.';
  if(!window.Peer || !window.__peerReady) return 'La libreria rete non si è caricata. Ricarica la pagina con connessione internet o pubblica il file online.';
  return '';
}

function hostCreate(){ const help=networkHelpText(); if(help){ NET.status=help; render(); return; } const name=(document.getElementById('hostName')?.value||'Host').trim()||'Host'; const count=Number(document.getElementById('hostCount')?.value||4); NET.mode='online'; NET.isHost=true; NET.myName=name; G.meta.setupN=count; NET.status='Creo stanza…'; NET.myPeerId=null; render(); const code=Math.random().toString(36).slice(2,7).toLowerCase(); const room='frattura-'+code; let peer; try{ peer=new Peer(room,peerOptions()); }catch(e){ NET.status='Impossibile creare la stanza: '+(e?.message||e); render(); return; } NET.peer=peer; NET.roomCode=code.toUpperCase(); withPeerTimeout('host',()=>{ NET.status='Creazione stanza fallita. Usa il gioco da un link https pubblico, non da file locale.'; render(); }); peer.on('open',id=>{ NET._peerWaitToken=null; NET.myPeerId=id; NET.status='Stanza pronta.'; initPlayers([name]); NET.myPlayerIdx=0; render(); syncLobby(); }); peer.on('connection',conn=>handleIncomingConnection(conn)); peer.on('error',err=>{ NET.status='Errore rete: '+(err?.type||err?.message||'sconosciuto'); render(); }); }
function handleIncomingConnection(conn){ conn.on('open',()=>{}); conn.on('data',msg=>hostOnMessage(conn,msg)); conn.on('close',()=>hostDropConn(conn)); }
function hostOnMessage(conn,msg){ if(!msg||!msg.kind) return; if(msg.kind==='joinRequest'){ if(G.players.length>=G.meta.setupN){ sendToConn(conn,{kind:'joinDenied',reason:'Stanza piena'}); return; } const idx=G.players.length; G.players.push({name:msg.name||('Giocatore '+(idx+1)),roleId:null,position:2,hand:[],tokens:2,debts:0,madeCollapse:false}); NET.conns[idx]=conn; conn.__playerIdx=idx; sendToConn(conn,{kind:'joined',playerIdx:idx,roomCode:NET.roomCode}); syncLobby(); }

}
function hostDropConn(conn){ const pi=conn.__playerIdx; if(pi==null) return; NET.status=`Connessione persa con ${playerName(pi)}.`; render(); }
function handleHostAction(pi,action,payload){ if(action==='submitCard') submitCardHost(pi,payload.cardId); else if(action==='travel') finishTravelHost(pi,payload.delta||0); else if(action==='spendToken') spendTokenHost(pi,payload.action,payload.arg); else if(action==='special') resolveSpecialFromHost(payload); else if(action==='closePeek') closePeekHand(); }
function syncLobby(){ if(G.players.length===0) return; if(G.players.length===G.meta.setupN){ const roles=shuffle(ROLE_DIST[G.players.length]).slice(0,G.players.length); G.players.forEach((p,i)=>{ p.roleId=roles[i]; }); G.deck=makeDeck(); G.discard=[]; G.deckReshuffles=0; G.players.forEach((p,i)=>{ p.hand=[]; p.tokens=2; p.debts=0; p.position=2; p.madeCollapse=false; }); G.players.forEach((_,i)=>drawN(i,5)); startGame(); syncAll(); return; }

function receiveLobby(msg){ NET.myPlayerIdx=msg.playerIdx; NET.publicState=msg.publicState; NET.hand=msg.hand||[]; NET.needed=msg.needed; render(); }
function joinRoom(){ const help=networkHelpText(); if(help){ NET.status=help; render(); return; } const rawCode=(document.getElementById('joinCode')?.value||'').trim(); const code=rawCode.toLowerCase(); const name=(document.getElementById('joinName')?.value||'').trim()||'Giocatore'; if(!code) return; NET.mode='online'; NET.isHost=false; NET.myName=name; NET.roomCode=code.toUpperCase(); NET.status='Connessione in corso…'; NET.myPeerId=null; render(); let peer; try{ peer=new Peer(undefined,peerOptions()); }catch(e){ NET.status='Impossibile inizializzare la rete: '+(e?.message||e); render(); return; } NET.peer=peer; withPeerTimeout('join',()=>{ if(!NET.myPlayerIdx) { NET.status='Connessione fallita. Verifica codice stanza e apri il gioco da un link https pubblico.'; render(); } }); peer.on('open',id=>{ NET.myPeerId=id; const conn=peer.connect('frattura-'+code,{reliable:true,serialization:'json'}); NET.hostConn=conn; conn.on('open',()=>{ NET.status='Richiesta di accesso inviata.'; sendToConn(conn,{kind:'joinRequest',name}); render(); }); conn.on('data',clientOnMessage); conn.on('error',err=>{ NET.status='Errore connessione: '+(err?.type||err?.message||'sconosciuto'); render(); }); conn.on('close',()=>{ NET.status='Connessione chiusa.'; render(); }); }); peer.on('error',err=>{ NET.status='Errore rete: '+(err?.type||err?.message||'sconosciuto'); render(); }); }

function sendAction(action,payload={}){ if(NET.isHost){ handleHostAction(NET.myPlayerIdx,action,payload); } else { sendToConn(NET.hostConn,{kind:'action',action,payload}); } }

function board(ps){ const hasActive=Number.isInteger(ps.activeEpoch)&&EPOCHS[ps.activeEpoch]; const activeLabel=hasActive?`${EPOCHS[ps.activeEpoch].emoji} ${EPOCHS[ps.activeEpoch].name}`:'In attesa'; const nextLabel=ps.peekEpoch!=null&&EPOCHS[ps.peekEpoch]?`${EPOCHS[ps.peekEpoch].emoji} ${EPOCHS[ps.peekEpoch].name}`:''; return `<div class="box"><div class="topline"><div class="title">Round ${ps.round||1}</div><div class="pills"><span class="pill current">Epoca attiva: ${activeLabel}</span>${nextLabel?`<span class="pill">Prossima: ${nextLabel}</span>`:''}${NET.roomCode?`<span class="pill">Stanza: ${NET.roomCode}</span>`:''}</div></div><div class="sep"></div><div class="epochs">${EPOCHS.map((e,i)=>`<div class="epoch ${hasActive&&i===ps.activeEpoch?'active':''}"><div class="emoji">${e.emoji}</div><div class="ename">${e.name}</div><div class="eval" style="color:${colorForState(ps.epochStates[i])}">${ps.epochStates[i]>0?'+':''}${ps.epochStates[i]}</div><div class="bar"><div class="fill" style="width:${statePct(ps.epochStates[i])}%;background:${colorForState(ps.epochStates[i])}"></div></div></div>`).join('')}</div></div>`; }

function myRoleBox(){ const ps=currentPublic(); const p=ps?.players?.[NET.myPlayerIdx]; if(!p||!p.roleId) return ''; const r=roleById(p.roleId); return `<div class="box"> <div class="label">Il tuo ruolo</div> <div class="role ${r.fac==='signori'?'sig':'alt'}"><div class="mini">${r.fac==='signori'?'SIGNORE DEL TEMPO':'ALTERATORE'}</div><div class="rtitle">${esc(r.name)}</div><div class="robj">${esc(r.obj)}</div></div></div>`; }
function myHandBox(){ const ps=currentPublic(); const p=myPlayer(); if(!ps||!p) return ''; const hand=NET.hand||[]; return `<div class="box"><div class="topline"><div class="title">La tua mano</div><div class="mini">Sempre visibile anche durante il turno degli altri</div></div><div class="sep"></div><div class="cardGrid">${hand.map(c=>{ const selectable=NET.canAct && ps.phase==='pose'; const canSel=selectable; return `<div class="card ${window.__sel===c.id?'sel':''} ${canSel?'':'dim'}" onclick="${canSel?`window.__sel=${c.id};render()`:'void(0)'}"><div class="e">${esc(epochBadge(c))}</div><div class="n">${esc(c.name)}</div><div class="d">${esc(c.desc)}</div><div class="f"><span class="v ${c.value>0?'pos':c.value<0?'neg':'neu'}">${c.value>0?'+':''}${c.value}</span><span class="tag">${esc(thresholdText(c))}</span></div></div>`; }).join('')}</div>${ps.phase==='pose'?`<div class="sep"></div><div class="actions"><button class="btn" ${!NET.canAct||window.__sel==null?'disabled':''} onclick="sendAction('submitCard',{cardId:window.__sel});window.__sel=null;">Conferma carta</button></div>`:''}</div>`; }
function travelBox(){ const ps=currentPublic(); const p=myPlayer(); if(!ps||!p||ps.phase!=='travel') return ''; return `<div class="box"><div class="title">Viaggio e gettoni</div><div class="sep"></div><div class="mini">Posizione: <span class="kbd">${EPOCHS[p.position].emoji} ${EPOCHS[p.position].name}</span> · Token: <span class="kbd">${p.tokens}</span></div><div class="sep"></div><div class="actions"><button class="btn alt" ${!NET.canAct||p.tokens<1?'disabled':''} onclick="sendAction('spendToken',{action:'draw1'})">1 gettone → pesca 1</button><button class="btn alt" ${!NET.canAct||p.tokens<3?'disabled':''} onclick="sendAction('spendToken',{action:'draw2'})">3 gettoni → pesca 2</button></div><div class="sep"></div><div class="label">Forza prossima epoca (5 gettoni)</div><div class="grid g3">${EPOCHS.map(e=>`<button class="btn alt" ${!NET.canAct||p.tokens<5?'disabled':''} onclick="sendAction('spendToken',{action:'forceEpoch',arg:${e.id}})">${e.emoji} ${e.name}</button>`).join('')}</div><div class="sep"></div><div class="actions"><button class="btn alt" ${!NET.canAct||p.position===0||ps.playersReady[NET.myPlayerIdx]||G.freezeMove?.has?.(NET.myPlayerIdx)?'disabled':''} onclick="sendAction('travel',{delta:-1})">← Vai indietro</button><button class="btn warn" ${!NET.canAct||ps.playersReady[NET.myPlayerIdx]?'disabled':''} onclick="sendAction('travel',{delta:0})">Resta fermo</button><button class="btn alt" ${!NET.canAct||p.position===5||ps.playersReady[NET.myPlayerIdx]||G.freezeMove?.has?.(NET.myPlayerIdx)?'disabled':''} onclick="sendAction('travel',{delta:1})">Vai avanti →</button></div></div>`; }
function pendingSpecialBox(){ const ps=currentPublic(); const sp=ps?.pendingSpecial; if(!sp) return ''; const isMine=sp.pi===NET.myPlayerIdx; if(sp.type==='peekHand' && sp.target!=null){ if(isMine){ const target=ps.players[sp.target]; return `<div class="box"><div class="title">Mano osservata</div><div class="mini">Stai guardando la mano di ${esc(target.name)}.</div><div class="sep"></div><div class="cardGrid">${(NET.isHost?G.players[sp.target].hand:[]).map(c=>`<div class="card"><div class="e">${esc(epochBadge(c))}</div><div class="n">${esc(c.name)}</div><div class="d">${esc(c.desc)}</div></div>`).join('') || '<div class="mini">La visualizzazione completa della mano bersaglio è disponibile solo sull’host.</div>'}</div><div class="sep"></div><button class="btn" onclick="sendAction('closePeek')">Chiudi</button></div>`; }
      return `<div class="box"><div class="title">Effetto speciale in corso</div><div class="mini">${esc(ps.players[sp.pi].name)} sta guardando una mano.</div></div>`; }
  if(!isMine) return `<div class="box"><div class="title">Effetto speciale in corso</div><div class="mini">In attesa della scelta di ${esc(ps.players[sp.pi].name)}: ${esc(sp.cardName||'Carta speciale')}.</div></div>`;
  if(sp.type==='plusMinus') return `<div class="box"><div class="title">${esc(sp.cardName)}</div><div class="actions"><button class="btn" onclick="sendAction('special',{value:1})">+1</button><button class="btn bad" onclick="sendAction('special',{value:-1})">−1</button></div></div>`;
  if(sp.type==='swapOther') return `<div class="box"><div class="title">Scegli l’altra epoca</div><div class="grid g3">${EPOCHS.filter(e=>e.id!==ps.activeEpoch).map(e=>`<button class="btn alt" onclick="sendAction('special',{epoch:${e.id}})">${e.emoji} ${e.name}</button>`).join('')}</div></div>`;
  if(sp.type==='setZeroChoice') return `<div class="box"><div class="title">Epoca a 0</div><div class="actions"><button class="btn" onclick="sendAction('special',{value:2})">Porta a +2</button><button class="btn bad" onclick="sendAction('special',{value:-2})">Porta a −2</button></div></div>`;
  if(sp.type==='pickTargetDiscard') return `<div class="box"><div class="title">Scegli il bersaglio</div><div class="grid g2">${ps.players.map((p,i)=>i!==NET.myPlayerIdx?`<button class="btn alt" onclick="sendAction('special',{target:${i}})">${esc(p.name)}</button>`:'').join('')}</div></div>`;
  if(sp.type==='plusOtherEpoch') return `<div class="box"><div class="title">Scegli un’altra epoca</div><div class="grid g3">${EPOCHS.filter(e=>e.id!==ps.activeEpoch).map(e=>`<button class="btn alt" onclick="sendAction('special',{epoch:${e.id}})">${e.emoji} ${e.name}</button>`).join('')}</div></div>`;
  if(sp.type==='industryShift') return `<div class="box"><div class="title">Rivoluzione Industriale</div>${ps.epochStates[ps.activeEpoch]===0?`<div class="actions"><button class="btn" onclick="sendAction('special',{mode:'big',value:3})">Porta a +3</button><button class="btn bad" onclick="sendAction('special',{mode:'big',value:-3})">Porta a −3</button></div>`:`<div class="actions"><button class="btn" onclick="sendAction('special',{mode:'small',value:1})">+1</button><button class="btn bad" onclick="sendAction('special',{mode:'small',value:-1})">−1</button></div>`}</div>`;
  if(sp.type==='peekHand') return `<div class="box"><div class="title">Scegli quale mano guardare</div><div class="grid g2">${ps.players.map((p,i)=>i!==NET.myPlayerIdx?`<button class="btn alt" onclick="sendAction('special',{target:${i}})">${esc(p.name)}</button>`:'').join('')}</div></div>`;
  if(sp.type==='swapAnyTwo') return `<div class="box"><div class="title">Scegli due epoche</div><div class="grid g3">${EPOCHS.map(e=>`<button class="btn alt" onclick="(function(){window.__swap=window.__swap||[]; if(!window.__swap.includes(${e.id})) window.__swap.push(${e.id}); if(window.__swap.length===2){sendAction('special',{selected:window.__swap.slice(0,2)}); window.__swap=[];} render();})()">${e.emoji} ${e.name}</button>`).join('')}</div><div class="mini">Scelte: ${(window.__swap||[]).map(i=>EPOCHS[i].name).join(' / ')||'nessuna'}</div></div>`;
  if(sp.type==='minusAnyEpoch') return `<div class="box"><div class="title">Scegli l’epoca che subisce −1</div><div class="grid g3">${EPOCHS.map(e=>`<button class="btn alt" onclick="sendAction('special',{epoch:${e.id}})">${e.emoji} ${e.name}</button>`).join('')}</div></div>`;
  if(sp.type==='nested') return `<div class="box"><div class="title">Paradosso Nidificato</div><div class="mini">Gioca subito un’altra carta ignorando le soglie.</div><div class="sep"></div><div class="cardGrid">${(NET.hand||[]).map(c=>`<div class="card" onclick="sendAction('special',{cardId:${c.id}})"><div class="e">${esc(epochBadge(c))}</div><div class="n">${esc(c.name)}</div><div class="d">${esc(c.desc)}</div></div>`).join('')}</div></div>`;
  return ''; }
function renderMenu(){ return `<div class="page"><div class="logo">Frattura del Tempo</div><div class="sub">Multiplayer da più telefoni. Ogni giocatore vede sempre la propria mano e la linea temporale.</div><div class="grid g2"><div class="box"><div class="title">Crea stanza</div><div class="sep"></div><div class="label">Il tuo nome</div><input id="hostName" type="text" value="Host" /><div class="label" style="margin-top:10px">Numero giocatori</div><select id="hostCount">${[4,5,6].map(n=>`<option value="${n}">${n}</option>`).join('')}</select><div class="sep"></div><button class="btn" onclick="hostCreate()">Crea stanza multiplayer</button></div><div class="box"><div class="title">Entra in stanza</div><div class="sep"></div><div class="label">Codice stanza</div><input id="joinCode" type="text" placeholder="Es. A1B2C" /><div class="label" style="margin-top:10px">Il tuo nome</div><input id="joinName" type="text" placeholder="Il tuo nome" /><div class="sep"></div><button class="btn alt" onclick="joinRoom()">Entra</button></div></div><div class="box"><div class="label">Uso consigliato</div><div class="smallList"><div class="li">1. Metti questo file online su <b>GitHub Pages</b> o <b>itch.io</b>.</div><div class="li">2. Un giocatore crea la stanza e condivide il codice.</div><div class="li">3. Ogni altro giocatore apre lo stesso link dal proprio telefono ed entra col codice.</div><div class="li">4. Durante il turno degli altri, ciascuno continua a vedere la propria mano e la plancia.</div></div></div>${NET.status?`<div class="box center"><div class="status">${esc(NET.status)}</div></div>`:''}</div>`; }
function renderLobby(){ const ps=currentPublic()||buildPublicState(); const needed=NET.isHost?G.meta.setupN:NET.needed; return `<div class="page"><div class="box center"><div class="title">Stanza multiplayer</div><div class="bigCode">${esc(NET.roomCode||'—')}</div><div class="sub">Condividi questo codice agli altri giocatori</div><div class="status">Giocatori collegati: <b>${ps.players.length}</b> / <b>${needed||'?'}</b></div></div>${playersBar(ps)}${myRoleBox()}${myHandBox()}${logBox(ps)}</div>`; }
function renderPlaying(){ const ps=currentPublic(); if(!ps) return renderMenu(); return `<div class="page"><div class="twoCol"><div>${board(ps)}${playersBar(ps)}${pendingSpecialBox()}${travelBox()}${logBox(ps)}</div><div>${myRoleBox()}${myHandBox()}<div class="box"><div class="title">Stato personale</div><div class="sep"></div><div class="mini">${NET.canAct?'È il tuo momento di agire.':'Al momento stai osservando. La tua mano resta comunque visibile.'}</div></div></div></div></div>`; }
function renderEnd(){ const ps=currentPublic(); return `<div class="page"><div class="box center"><div class="title">Fine partita</div><div class="sub">${esc(ps.endReason||'Partita conclusa.')}</div></div>${board(ps)}<div class="box"><div class="label">Esito ruoli</div>${ps.players.map((p,i)=>{ const r=roleById(p.roleId); const won=ps.winnerIdxs.includes(i); return `<div class="role ${r.fac==='signori'?'sig':'alt'}" style="margin-bottom:10px"><div class="topline"><div><div class="mini">${esc(p.name)}</div><div class="rtitle">${esc(r.name)}</div></div><div class="title ${won?'good':'bad'}">${won?'VINCE':'NON VINCE'}</div></div><div class="robj">${esc(r.obj)}</div></div>`; }).join('')}</div><div class="box center"><button class="btn" onclick="resetAll();render()">Nuova stanza</button></div></div>`; }
function render(){ const ps=currentPublic(); let html=''; if(!NET.mode || G.phase==='menu') html=renderMenu(); else if((NET.isHost && G.phase==='lobby' && G.players.some(p=>!p.roleId)) || (!NET.isHost && !ps?.phase)) html=renderLobby(); else if(ps && ['pose','travel','resolve','playing'].includes(ps.phase)) html=renderPlaying(); else if(ps && ps.phase==='end') html=renderEnd(); else if(ps && ps.phase==='lobby') html=renderLobby(); else html=renderMenu(); document.getElementById('app').innerHTML=html; }
resetAll(); render();
</script>
</body>
</html>
